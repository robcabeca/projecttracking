document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

through here\"] },\n      { n: \"Finances\", c: \"Money\", s: \"Active\", pr: \"High\", t: [\"edit spending plan\",\"enter reciepts\",\"link all planned income\",\"Buy new Bowker ISBN's\"] },\n      { n: \"Winning Big lottery\", c: \"Money\", s: \"Idea\", pr: \"Low\", t: [\"set up corp\",\"set up trust\",\"set up foundation\",\"plan which company to use for $ management of it.\"] }\n    ];\n    return raw.map((p, i) => ({\n      id: \"p\" + i,\n      name: p.n,\n      category: p.c,\n      status: p.s,\n      priority: p.pr,\n      note: \"\",\n      tasks: p.t.map((t, j) => ({ id: \"p\" + i + \"t\" + j, t, done: false }))\n    }));\n  }\n\n  componentDidMount() {\n    try {\n      const s = localStorage.getItem(this.KEY);\n      if (s) {\n        const parsed = JSON.parse(s);\n        if (Array.isArray(parsed) && parsed.length) this.setState({ projects: parsed });\n      }\n    } catch (e) {}\n  }\n\n  uid() { return \"x\" + Date.now().toString(36) + Math.floor(Math.random() * 1e5).toString(36); }\n  persist() { try { localStorage.setItem(this.KEY, JSON.stringify(this.state.projects)); } catch (e) {} }\n  mutate(fn) { this.setState(s => ({ projects: fn(s.projects) }), () => this.persist()); }\n  mapP(pid, fn) { this.mutate(ps => ps.map(p => p.id !== pid ? p : fn(p))); }\n\n  toggleTask(pid, tid) { this.mapP(pid, p => ({ ...p, tasks: p.tasks.map(t => t.id !== tid ? t : { ...t, done: !t.done }) })); }\n  commitTask(pid, tid, text) { const v = text.trim(); this.mapP(pid, p => ({ ...p, tasks: p.tasks.map(t => t.id !== tid ? t : { ...t, t: v || t.t }) })); }\n  deleteTask(pid, tid) { this.mapP(pid, p => ({ ...p, tasks: p.tasks.filter(t => t.id !== tid) })); }\n  addTask(pid, text) { const id = this.uid(); this.mapP(pid, p => ({ ...p, tasks: [...p.tasks, { id, t: text, done: false }] })); }\n  setStatus(pid, v) { this.mapP(pid, p => ({ ...p, status: v })); }\n  setCategory(pid, v) { this.mapP(pid, p => ({ ...p, category: v })); }\n  setPriority(pid, v) { this.mapP(pid, p => ({ ...p, priority: v })); }\n  cyclePriority(pid) { const order = [\"High\", \"Medium\", \"Low\"]; this.mapP(pid, p => ({ ...p, priority: order[(order.indexOf(p.priority) + 1) % 3] })); }\n  setName(pid, v) { this.mapP(pid, p => ({ ...p, name: v })); }\n  setTaskText(pid, tid, v) { this.mapP(pid, p => ({ ...p, tasks: p.tasks.map(t => t.id !== tid ? t : { ...t, t: v }) })); }\n  setNote(pid, v) { this.mapP(pid, p => ({ ...p, note: v })); }\n  deleteProject(pid) { this.mutate(ps => ps.filter(p => p.id !== pid)); }\n  toggleExpand(pid) { this.setState(s => ({ expanded: { ...s.expanded, [pid]: !s.expanded[pid] } })); }\n  toggleDetails(pid) { this.setState(s => ({ details: { ...s.details, [pid]: !s.details[pid] } })); }\n\n  addProject() {\n    const id = this.uid();\n    this.mutate(ps => [{ id, name: \"\", category: \"Business\", status: \"Active\", priority: \"Medium\", note: \"\", tasks: [] }, ...ps]);\n    this.setState(s => ({ expanded: { ...s.expanded, [id]: true }, filterStatus: null, filterCat: null, query: \"\", sort: \"status\" }));\n  }\n\n  exportBackup() {\n    try {\n      const data = { app: \"project-tracker\", version: 1, exportedAt: new Date().toISOString(), projects: this.state.projects };\n      const blob = new Blob([JSON.stringify(data, null, 2)], { type: \"application/json\" });\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement(\"a\");\n      a.href = url;\n      a.download = \"project-tracker-backup-\" + new Date().toISOString().slice(0, 10) + \".json\";\n      document.body.appendChild(a); a.click(); a.remove();\n      setTimeout(() => URL.revokeObjectURL(url), 1000);\n    } catch (e) { alert(\"Backup failed: \" + e.message); }\n  }\n\n  importBackup(e) {\n    const file = e.target.files && e.target.files[0];\n    e.target.value = \"\";\n    if (!file) return;\n    const reader = new FileReader();\n    reader.onload = () => {\n      try {\n        const parsed = JSON.parse(reader.result);\n        const projects = Array.isArray(parsed) ? parsed : parsed.projects;\n        if (!Array.isArray(projects) || !projects.length) { alert(\"That file doesn't look like a tracker backup.\"); return; }\n        if (!confirm(\"Restore \" + projects.length + \" projects from this backup? This replaces everything currently in the tracker.\")) return;\n        const clean = projects.map((p, i) => ({\n          id: p.id || (\"p\" + i),\n          name: p.name || \"Untitled project\",\n          category: p.category || \"Business\",\n          status: p.status || \"Active\",\n          priority: p.priority || \"Medium\",\n          note: p.note || \"\",\n          tasks: Array.isArray(p.tasks) ? p.tasks.map((t, j) => ({ id: t.id || (\"p\" + i + \"t\" + j), t: t.t || \"\", done: !!t.done })) : []\n        }));\n        this.setState({ projects: clean, expanded: {}, filterStatus: null, filterCat: null, query: \"\", sort: \"status\" }, () => this.persist());\n      } catch (err) { alert(\"Could not read that file: \" + err.message); }\n    };\n    reader.readAsText(file);\n  }\n\n  renderVals() {\n    const accent = this.props.accentColor ?? \"oklch(0.58 0.13 40)\";\n    const tint = (c, p) => \"color-mix(in oklab, \" + c + \" \" + p + \"%, white)\";\n    const statusMeta = {\n      \"Active\":  { color: \"oklch(0.55 0.13 150)\" },\n      \"On hold\": { color: \"oklch(0.68 0.13 65)\" },\n      \"Idea\":    { color: \"oklch(0.58 0.09 285)\" },\n      \"Done\":    { color: \"oklch(0.52 0.04 160)\" }\n    };\n    const catMeta = {\n      \"Business\": { color: \"oklch(0.62 0.1 250)\" },\n      \"Creative\": { color: \"oklch(0.63 0.13 330)\" },\n      \"Money\":    { color: \"oklch(0.58 0.12 145)\" },\n      \"Personal\": { color: \"oklch(0.66 0.11 60)\" }\n    };\n    const prioMeta = {\n      \"High\":   { color: \"oklch(0.58 0.18 28)\", glyph: \"\\u25B2\", rank: 0 },\n      \"Medium\": { color: \"oklch(0.7 0.13 70)\",  glyph: \"\\u25B3\", rank: 1 },\n      \"Low\":    { color: \"oklch(0.78 0.015 80)\", glyph: \"\\u25B3\", rank: 2 }\n    };\n    const statusOrder = [\"Active\", \"On hold\", \"Idea\", \"Done\"];\n    const catOrder = [\"Business\", \"Creative\", \"Money\", \"Personal\"];\n    const all = this.state.projects;\n\n    // ---- portfolio stats (always from full set) ----\n    const active = all.filter(p => p.status === \"Active\").length;\n    const idea = all.filter(p => p.status === \"Idea\").length;\n    let openTasks = 0, doneTasks = 0;\n    all.forEach(p => p.tasks.forEach(t => t.done ? doneTasks++ : openTasks++));\n    const tiles = [\n      { n: all.length, l: \"Projects in play\", color: \"oklch(0.23 0.01 60)\" },\n      { n: active, l: \"Active right now\", color: statusMeta[\"Active\"].color },\n      { n: openTasks, l: \"Open tasks\", color: accent },\n      { n: doneTasks, l: \"Tasks done\", color: statusMeta[\"Active\"].color }\n    ];\n\n    // ---- filters ----\n    const q = this.state.query.trim().toLowerCase();\n    let list = all;\n    if (this.state.filterStatus) list = list.filter(p => p.status === this.state.filterStatus);\n    if (this.state.filterCat) list = list.filter(p => p.category === this.state.filterCat);\n    if (q) list = list.filter(p => p.name.toLowerCase().includes(q) || p.tasks.some(t => t.t.toLowerCase().includes(q)));\n\n    // ---- sort ----\n    const meta = p => {\n      const total = p.tasks.length;\n      const done = p.tasks.filter(t => t.done).length;\n      return { total, done, open: total - done, pct: total ? done / total : 0 };\n    };\n    const sort = this.state.sort;\n    const sorted = list.map((p, i) => ({ p, i, m: meta(p) }));\n    sorted.sort((a, b) => {\n      if (sort === \"alpha\") return a.p.name.toLowerCase().localeCompare(b.p.name.toLowerCase()) || a.i - b.i;\n      if (sort === \"priority\") return prioMeta[a.p.priority].rank - prioMeta[b.p.priority].rank || statusOrder.indexOf(a.p.status) - statusOrder.indexOf(b.p.status) || a.i - b.i;\n      if (sort === \"open\") return b.m.open - a.m.open || a.i - b.i;\n      if (sort === \"progress\") return b.m.pct - a.m.pct || a.i - b.i;\n      return statusOrder.indexOf(a.p.status) - statusOrder.indexOf(b.p.status) || a.i - b.i; // status (stable)\n    });\n\n    const LIMIT = 4;\n    const view = sorted.map(({ p }) => {\n      const total = p.tasks.length;\n      const done = p.tasks.filter(t => t.done).length;\n      const pct = total ? Math.round((done / total) * 100) : 0;\n      const expanded = !!this.state.expanded[p.id];\n      const detailsOpen = !!this.state.details[p.id];\n      const shown = expanded ? p.tasks : p.tasks.slice(0, LIMIT);\n      const hidden = Math.max(0, total - LIMIT);\n      const sm = statusMeta[p.status];\n      const pm = prioMeta[p.priority];\n      return {\n        id: p.id, name: p.name, category: p.category, status: p.status, priority: p.priority, note: p.note,\n        statusColor: sm.color, statusSoft: tint(sm.color, 12), statusBorder: tint(sm.color, 38),\n        catColor: catMeta[p.category].color,\n        prioColor: pm.color, prioGlyph: pm.glyph, prioTitle: \"Priority: \" + p.priority + \" · click to change\",\n        cardBorder: p.priority === \"High\" ? tint(pm.color, 45) : \"oklch(0.91 0.006 80)\",\n        pct, pctWidth: pct + \"%\",\n        countLabel: total ? done + \"/\" + total : \"no tasks yet\",\n        expanded,\n        showEmptyNote: total === 0 && !expanded,\n        showToggle: total > LIMIT,\n        toggleLabel: expanded ? \"Show less\" : \"+ \" + hidden + \" more\",\n        detailsOpen,\n        detailsLabel: detailsOpen ? \"Close details\" : \"⚙ Details\",\n        displayTasks: shown.map(t => ({\n          id: t.id, t: t.t, done: t.done,\n          boxBg: t.done ? \"oklch(0.55 0.13 150)\" : \"transparent\",\n          boxBorder: t.done ? \"oklch(0.55 0.13 150)\" : \"oklch(0.82 0.006 80)\",\n          textColor: t.done ? \"oklch(0.68 0.01 80)\" : \"oklch(0.36 0.01 60)\",\n          textDeco: t.done ? \"line-through\" : \"none\",\n          onToggle: () => this.toggleTask(p.id, t.id),\n          onInput: (e) => this.setTaskText(p.id, t.id, e.target.value),\n          onKey: (e) => { if (e.key === \"Enter\") { e.preventDefault(); e.target.blur(); } },\n          onDelete: () => this.deleteTask(p.id, t.id)\n        })),\n        onStatusChange: (e) => this.setStatus(p.id, e.target.value),\n        onCatChange: (e) => this.setCategory(p.id, e.target.value),\n        onPriorityChange: (e) => this.setPriority(p.id, e.target.value),\n        onCyclePriority: () => this.cyclePriority(p.id),\n        onTitleInput: (e) => this.setName(p.id, e.target.value),\n        onTitleKey: (e) => { if (e.key === \"Enter\") { e.preventDefault(); e.target.blur(); } },\n        onNoteInput: (e) => this.setNote(p.id, e.target.value),\n        onAddKey: (e) => { if (e.key === \"Enter\" && e.target.value.trim()) { this.addTask(p.id, e.target.value.trim()); e.target.value = \"\"; } },\n        onToggleExpand: () => this.toggleExpand(p.id),\n        onToggleDetails: () => this.toggleDetails(p.id),\n        onDelete: () => { if (confirm('Delete \"' + (p.name || \"this project\") + '\" and all its tasks?')) this.deleteProject(p.id); }\n      };\n    });\n\n    // ---- chips ----\n    const fs = this.state.filterStatus, fc = this.state.filterCat;\n    const mkChip = (label, count, color, active, onClick) => ({\n      label, count, color,\n      bg: active ? tint(color, 15) : \"white\",\n      border: active ? tint(color, 45) : \"oklch(0.9 0.006 80)\",\n      textColor: active ? \"oklch(0.3 0.04 60)\" : \"oklch(0.45 0.01 60)\",\n      onClick\n    });\n    const allChip = mkChip(\"All\", all.length, \"oklch(0.5 0.01 60)\", !fs && !fc,\n      () => this.setState({ filterStatus: null, filterCat: null, query: \"\" }));\n    const statusChips = statusOrder.map(s => mkChip(s, all.filter(p => p.status === s).length, statusMeta[s].color, fs === s,\n      () => this.setState(st => ({ filterStatus: st.filterStatus === s ? null : s }))));\n    const catChips = catOrder.map(c => mkChip(c, all.filter(p => p.category === c).length, catMeta[c].color, fc === c,\n      () => this.setState(st => ({ filterCat: st.filterCat === c ? null : c }))));\n\n    return {\n      accent,\n      subtitle: all.length + \" projects · \" + active + \" active\",\n      tiles, view, allChip, statusChips, catChips,\n      query: this.state.query,\n      sort: this.state.sort,\n      isEmpty: view.length === 0,\n      onQuery: (e) => this.setState({ query: e.target.value }),\n      onSort: (e) => this.setState({ sort: e.target.value }),\n      onAddProject: () => this.addProject(),\n      onExport: () => this.exportBackup(),\n      onImport: (e) => this.importBackup(e)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
